<form [formRoot]="form">
  <fieldset class="border-none p-0 m-0" [disabled]="form().submitting()">
    <div class="flex flex-col gap-4">
      <mat-form-field subscriptSizing="dynamic" class="w-1/2">
        <mat-label>Bright Username</mat-label>
        <input
          matInput
          type="input"
          [formField]="form.username"
          placeholder="Enter Bright username"
        />
      </mat-form-field>
      <mat-form-field subscriptSizing="dynamic" class="w-1/2">
        <mat-label>Bright Password</mat-label>
        <input
          matInput
          type="password"
          [formField]="form.password"
          placeholder="Enter Bright password"
        />
      </mat-form-field>
    </div>
    <div class="mt-4">
      <button
        mat-raised-button
        type="submit"
        [disabled]="!form().valid() || !form().dirty()"
      >
        Save
      </button>
    </div>
  </fieldset>
</form>
